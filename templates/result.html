<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Feedback Summary</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 2rem; background: #f8f8f8; }
    .block { background: white; padding: 1rem 2rem; border-radius: 8px; box-shadow: 0 0 8px rgba(0,0,0,0.1); margin-bottom: 1rem; }
    h2 { color: #333; }
    pre { background: #eee; padding: 1rem; border-radius: 6px; overflow-x: auto; }
    table { border-collapse: collapse; width: 100%; margin-top: 1rem; }
    th, td { border: 1px solid #ccc; padding: 0.5rem; text-align: left; }
    th { background: #f0f0f0; }
  </style>
</head>
<body>
  <div class="block">
    <h2>📊 Overall Feedback Summary</h2>
    <pre>{{ result }}</pre>
  </div>

  <a href="/" style="text-decoration:none;">
    ⬅️ Submit more feedback
  </a>
</body>
</html>
